<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeReset66 — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #f0c860;
      --gold-dim: #7a5e2a;
      --bg-dark: #0a0e1a;
      --bg-card: rgba(10, 14, 30, 0.88);
      --border-gold: rgba(201, 168, 76, 0.4);
      --border-gold-hover: rgba(201, 168, 76, 0.85);
      --text-primary: #f0e6c8;
      --text-muted: #8a7a5a;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(201, 168, 76, 0.25);
      --input-focus: rgba(201, 168, 76, 0.6);
    }
    html, body {
      min-height: 100%;
      background: var(--bg-dark);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
    }
    .bg-layer {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(10,14,26,0.72) 0%, rgba(10,14,26,0.55) 40%, rgba(10,14,26,0.88) 100%),
        url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1400&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particle { position: absolute; bottom: -10px; width: 3px; height: 3px; border-radius: 50%; background: var(--gold-light); opacity: 0; animation: rise var(--dur) ease-in infinite; animation-delay: var(--delay); left: var(--x); }
    @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 15% { opacity: 0.7; } 80% { opacity: 0.2; } 100% { transform: translateY(-100vh) scale(0.3); opacity: 0; } }
    .page { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .logo-area { text-align: center; margin-bottom: 2.4rem; }
    .logo-icon { font-size: 3.2rem; line-height: 1; display: block; margin-bottom: 0.5rem; filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); animation: pulse-icon 3s ease-in-out infinite; }
    @keyframes pulse-icon { 0%, 100% { filter: drop-shadow(0 0 8px rgba(201,168,76,0.4)); } 50% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.8)); } }
    .logo-title { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; letter-spacing: 0.08em; background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 60%, #8a6020 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo-sub { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 0.3rem; }
    .card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border-gold); border-radius: 4px; padding: 2.4rem 2.2rem; position: relative; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
    .card::before, .card::after { content: ''; position: absolute; width: 18px; height: 18px; border-color: var(--gold); border-style: solid; }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .card-inner-corner-tr, .card-inner-corner-bl { position: absolute; width: 18px; height: 18px; border-color: var(--gold); border-style: solid; }
    .card-inner-corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .card-inner-corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .card-title { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); text-align: center; margin-bottom: 1.8rem; text-transform: uppercase; }
    .avatar-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.8rem; }
    .avatar-circle { width: 84px; height: 84px; border-radius: 50%; border: 2px solid var(--border-gold); background: rgba(201,168,76,0.07); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.25s; }
    .avatar-circle:hover { border-color: var(--gold); }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
    .avatar-icon { font-size: 2.4rem; opacity: 0.55; }
    .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .avatar-circle:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay span { font-size: 1.3rem; }
    #avatar-input { display: none; }
    .avatar-label { margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 0.45rem; font-weight: 600; }
    .field input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 2px; color: var(--text-primary); font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 500; padding: 0.7rem 1rem; outline: none; transition: border-color 0.2s, background 0.2s; }
    .field input::placeholder { color: rgba(138,122,90,0.5); }
    .field input:focus { border-color: var(--input-focus); background: rgba(201,168,76,0.06); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 3rem; }
    .pw-toggle { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; padding: 0; line-height: 1; transition: color 0.2s; }
    .pw-toggle:hover { color: var(--gold); }
    .btn-enter { width: 100%; margin-top: 0.5rem; padding: 0.85rem 1rem; background: linear-gradient(135deg, #8a5e1a 0%, var(--gold) 50%, #8a5e1a 100%); background-size: 200% 100%; border: none; border-radius: 2px; color: #0a0e1a; font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background-position 0.4s, transform 0.15s, box-shadow 0.3s; box-shadow: 0 0 0 rgba(201,168,76,0); }
    .btn-enter:hover { background-position: 100% 0; box-shadow: 0 0 22px rgba(201,168,76,0.35); transform: translateY(-1px); }
    .btn-enter:active { transform: translateY(0); }
    .links { display: flex; justify-content: space-between; margin-top: 1.2rem; }
    .links a { font-size: 0.8rem; color: var(--text-muted); text-decoration: none; letter-spacing: 0.08em; transition: color 0.2s; }
    .links a:hover { color: var(--gold); }
    .register-link { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-muted); }
    .register-link a { color: var(--gold); text-decoration: none; font-weight: 600; transition: color 0.2s; }
    .register-link a:hover { color: var(--gold-light); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(4rem); background: rgba(10,14,26,0.95); border: 1px solid var(--border-gold); border-radius: 3px; padding: 0.7rem 1.4rem; font-size: 0.85rem; letter-spacing: 0.1em; color: var(--text-primary); z-index: 100; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s; opacity: 0; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { border-color: rgba(176,48,48,0.6); color: #e07070; }
    .toast.success { border-color: rgba(201,168,76,0.6); color: var(--gold-light); }
    .btn-enter .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(10,14,26,0.3); border-top-color: #0a0e1a; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -3px; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-enter.loading .spinner { display: inline-block; }
    .btn-enter.loading .btn-text { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="particles" id="particles"></div>
  <div class="page">
    <div class="logo-area">
      <span class="logo-icon">⚔️</span>
      <div class="logo-title">LifeReset 66</div>
      <div class="logo-sub">Forge Your Habit Mastery</div>
    </div>
    <div class="card">
      <div class="card-inner-corner-tr"></div>
      <div class="card-inner-corner-bl"></div>
      <div style="text-align:center;margin-bottom:0.6rem;">
        <div class="streak-badge">🔥 Join the 66-Day Challenge</div>
      </div>
      <div class="card-title">Create Your Legend</div>
      <div class="avatar-wrap">
        <div class="avatar-circle" id="avatar-btn" title="Upload profile image">
          <img id="avatar-preview" alt="Profile" />
          <span class="avatar-icon">🧑</span>
          <div class="avatar-overlay"><span>📷</span></div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" />
        <span class="avatar-label">Warrior Profile</span>
      </div>
      <div class="field">
        <label for="displayName">Warrior Name</label>
        <input type="text" id="displayName" placeholder="Enter your hero name" autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Warrior Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Secret Passphrase</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
          <button class="pw-toggle" id="pw-toggle" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Passphrase</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
        </div>
      </div>
      <button class="btn-enter" id="signup-btn">
        <span class="spinner" id="signup-spinner"></span>
        <span class="btn-text">Begin Adventure</span>
      </button>
      <div class="links">
        <a href="login.html">Already a warrior? Log in</a>
        <a href="index.html">Back to Camp</a>
      </div>
    </div>
    <div class="footer">LifeReset66 · Build Discipline. Earn XP. Level Up.</div>
  </div>
  <div class="toast" id="toast"></div>

  <script type="module" src="js/firebase-config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const pwInput = document.getElementById('password');
      document.getElementById('pw-toggle').addEventListener('click', () => {
        const isText = pwInput.type === 'text';
        pwInput.type = isText ? 'password' : 'text';
        document.getElementById('pw-toggle').textContent = isText ? '👁' : '🙈';
      });

      document.getElementById('avatar-btn').addEventListener('click', () => {
        document.getElementById('avatar-input').click();
      });
      document.getElementById('avatar-input').addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.getElementById('avatar-preview');
          img.src = e.target.result;
          img.style.display = 'block';
          document.querySelector('.avatar-icon').style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSignup();
      });
      document.getElementById('confirmPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSignup();
      });
      document.getElementById('signup-btn').addEventListener('click', handleSignup);

      if (window.Firebase && Firebase.onAuthStateChanged) {
        Firebase.onAuthStateChanged(user => {
          if (user) {
            window.location.href = 'index.html';
          }
        });
      }
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type}`;
      void toast.offsetWidth;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    function handleSignup() {
      const displayName = document.getElementById('displayName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('signup-btn');
      const avatarImg = document.getElementById('avatar-preview');
      const avatarURL = avatarImg.src || '';

      if (!displayName) { showToast('⚠️ Enter your warrior name', 'error'); return; }
      if (!email) { showToast('⚠️ Enter your warrior email', 'error'); return; }
      if (!password) { showToast('⚠️ Enter your passphrase', 'error'); return; }
      if (password !== confirmPassword) { showToast('⚠️ Passphrases do not match', 'error'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      Firebase.auth.createUserWithEmailAndPassword(email, password)
        .then(result => {
          const user = result.user;
          const initialData = {
            user: {
              name: displayName,
              avatar: '🧑',
              startDate: new Date().toISOString().slice(0, 10),
              xp: 0,
              level: 1,
              hardMode: false,
              onboardingComplete: false
            },
            habits: [],
            streaks: { current: 0, longest: 0, history: {} },
            timer: { totalSessions: 0, totalMinutes: 0 },
            settings: { notifications: false }
          };

          return user.updateProfile({ displayName: displayName, photoURL: avatarURL || null })
            .then(() => Firebase.saveAppData(user.uid, initialData));
        })
        .then(() => {
          showToast('⚔️ Account created! Redirecting to your camp…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        })
        .catch(err => {
          btn.classList.remove('loading');
          btn.disabled = false;
          showToast(err.message || 'Sign up failed. Try again.', 'error');
        });
    }

    const pc = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.setProperty('--x', Math.random() * 100 + 'vw');
      p.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
      p.style.setProperty('--delay', (Math.random() * 10) + 's');
      p.style.width = p.style.height = (1.5 + Math.random() * 2) + 'px';
      pc.appendChild(p);
    }
  </script>
</body>
</html>
